<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tripper — Explore the Map</title>

    <!-- Leaflet (OpenStreetMap) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap');

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            height: 100%;
            font-family: "Noto Sans", sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 14px 24px;
            background: #1F6357;
            color: #fff;
        }

        header h2 {
            margin: 0;
            letter-spacing: 2px;
        }

        header nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 22px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        header nav a:hover {
            color: #9fe7f0;
        }

        .subbar {
            padding: 10px 24px;
            background: #17a2b8;
            color: #fff;
            font-size: 15px;
        }

        #map {
            flex: 1 1 auto;
            width: 100%;
        }

        .leaflet-popup-content {
            text-align: center;
            font-family: "Noto Sans", sans-serif;
        }

        .leaflet-popup-content strong {
            display: block;
            color: #1F6357;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .leaflet-popup-content a {
            display: inline-block;
            margin-top: 4px;
            padding: 6px 12px;
            background: #17a2b8;
            color: #fff;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .leaflet-popup-content a:hover {
            background: #1F6357;
        }
    </style>
</head>

<body>
    <header>
        <h2>TRIPPER</h2>
        <nav>
            <a href="/">Home</a>
            <a href="it.html">Itineraries</a>
            <a href="/index.html">Reviews</a>
            <a href="about.html">About</a>
        </nav>
    </header>
    <div class="subbar">Tap a marker to explore itineraries for that destination.</div>

    <div id="map"></div>

    <script>
        // Destination values must match views/it.html exactly so explore.html resolves correctly.
        const destinations = [
            { name: "Andaman & Nicobar", destination: "Andaman%20&%20Nicobar", lat: 11.7401, lng: 92.6586 },
            { name: "Andhra Pradesh", destination: "Andhra%20Pradesh", lat: 15.9129, lng: 79.7400 },
            { name: "Arunachal Pradesh", destination: "Arunachal%20Pradesh", lat: 28.2180, lng: 94.7278 },
            { name: "Assam", destination: "Assam", lat: 26.2006, lng: 92.9376 },
            { name: "Bihar", destination: "Bihar", lat: 25.0961, lng: 85.3131 },
            { name: "Chandigarh", destination: "Chandigarh", lat: 30.7333, lng: 76.7794 },
            { name: "Chhattisgarh", destination: "Chhattisgarh", lat: 21.2787, lng: 81.8661 },
            { name: "Daman & Diu", destination: "Daman%20%26%20Diu", lat: 20.4283, lng: 72.8397 },
            { name: "Delhi", destination: "Delhi", lat: 28.7041, lng: 77.1025 },
            { name: "Goa", destination: "Goa", lat: 15.2993, lng: 74.1240 },
            { name: "Gujarat", destination: "Gujarat", lat: 22.2587, lng: 71.1924 },
            { name: "Haryana", destination: "Haryana", lat: 29.0588, lng: 76.0856 },
            { name: "Himachal Pradesh", destination: "Himachal%20Pradesh", lat: 31.1048, lng: 77.1734 },
            { name: "Jammu & Kashmir", destination: "Jammu%20%26%20Kashmir", lat: 33.7782, lng: 76.5762 },
            { name: "Jharkhand", destination: "Jharkhand", lat: 23.6102, lng: 85.2799 },
            { name: "Karnataka", destination: "Karnataka", lat: 15.3173, lng: 75.7139 },
            { name: "Kerala", destination: "Kerala", lat: 10.8505, lng: 76.2711 },
            { name: "Ladakh", destination: "Ladakh", lat: 34.1526, lng: 77.5771 },
            { name: "Lakshadweep", destination: "Lakshadweep", lat: 10.5667, lng: 72.6417 },
            { name: "Madhya Pradesh", destination: "Madhya%20Pradesh", lat: 22.9734, lng: 78.6569 },
            { name: "Maharashtra", destination: "Maharashtra", lat: 19.7515, lng: 75.7139 },
            { name: "Manipur", destination: "Manipur", lat: 24.6637, lng: 93.9063 },
            { name: "Meghalaya", destination: "Meghalaya", lat: 25.4670, lng: 91.3662 },
            { name: "Mizoram", destination: "Mizoram", lat: 23.1645, lng: 92.9376 },
            { name: "Nagaland", destination: "Nagaland", lat: 26.1584, lng: 94.5624 },
            { name: "Odisha", destination: "Odisha", lat: 20.9517, lng: 85.0985 },
            { name: "Puducherry", destination: "Puducherry", lat: 11.9416, lng: 79.8083 },
            { name: "Punjab", destination: "Punjab", lat: 31.1471, lng: 75.3412 },
            { name: "Rajasthan", destination: "Rajasthan", lat: 27.0238, lng: 74.2179 },
            { name: "Sikkim", destination: "Sikkim", lat: 27.5330, lng: 88.5122 },
            { name: "Tamil Nadu", destination: "tamil%20nadu", lat: 11.1271, lng: 78.6569 },
            { name: "Telangana", destination: "Telangana", lat: 17.1232, lng: 79.2088 },
            { name: "Tripura", destination: "Tripura", lat: 23.9408, lng: 91.9882 },
            { name: "Uttar Pradesh", destination: "Uttar%20Pradesh", lat: 26.8467, lng: 80.9462 },
            { name: "Uttarakhand", destination: "Uttarakhand", lat: 30.0668, lng: 79.0193 },
            { name: "West Bengal", destination: "West%20Bengal", lat: 22.9868, lng: 87.8550 }
        ];

        const map = L.map("map").setView([22.5, 80], 5);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 18,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        destinations.forEach(function (d) {
            L.marker([d.lat, d.lng])
                .addTo(map)
                .bindPopup(
                    '<strong>' + d.name + '</strong>' +
                    '<a href="explore.html?destination=' + d.destination + '">View itinerary &rarr;</a>'
                );
        });
    </script>
</body>

</html>
